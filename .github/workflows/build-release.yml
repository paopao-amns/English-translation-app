name: Build Release APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: "34.0.0"

      - name: Accept SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true

      - name: Write local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Generate launcher icons
        run: |
          python3 -c "
          import struct, zlib, os
          def create_png(width, height, r, g, b):
              def chunk(ctype, data):
                  c = ctype + data
                  return struct.pack('>I', len(data)) + c + struct.pack('>I', zlib.crc32(c) & 0xffffffff)
              header = b'\x89PNG\r\n\x1a\n'
              ihdr = chunk(b'IHDR', struct.pack('>IIBBBBB', width, height, 8, 2, 0, 0, 0))
              raw = b''
              for y in range(height):
                  raw += b'\x00'
                  for x in range(width):
                      raw += bytes([r, g, b])
              idat = chunk(b'IDAT', zlib.compress(raw))
              iend = chunk(b'IEND', b'')
              return header + ihdr + idat + iend
          for d in ['mdpi', 'hdpi', 'xhdpi', 'xxhdpi']:
              os.makedirs(f'app/src/main/res/mipmap-{d}', exist_ok=True)
              with open(f'app/src/main/res/mipmap-{d}/ic_launcher.png', 'wb') as f:
                  f.write(create_png(48, 48, 26, 115, 232))
          "

      - name: Verify Gradle wrapper JAR
        run: |
          if [ -f gradle/wrapper/gradle-wrapper.jar ]; then
            echo "Gradle wrapper JAR found ($(stat -c%s gradle/wrapper/gradle-wrapper.jar) bytes)."
          else
            echo "ERROR: gradle-wrapper.jar is missing. It should be committed to the repo."
            exit 1
          fi

      - name: Generate release keystore
        run: |
          keytool -genkeypair \
            -alias release \
            -keyalg RSA \
            -keysize 2048 \
            -validity 36500 \
            -keystore release.keystore \
            -storepass android \
            -keypass android \
            -dname "CN=EngLearn, OU=Dev, O=EngLearn, L=City, S=State, C=CN" \
            -noprompt

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build debug APK
        run: |
          set -o pipefail
          echo "=== Building debug APK ==="
          ./gradlew assembleDebug 2>&1 | tee build-log.txt
          echo "EXIT_CODE=$?"

      - name: Build release APK
        run: |
          set -o pipefail
          echo "=== Building release APK ==="
          ./gradlew assembleRelease 2>&1 | tee -a build-log.txt
          echo "EXIT_CODE=$?"
        env:
          KEYSTORE_PASSWORD: android
          KEY_ALIAS: release
          KEY_PASSWORD: android

      - name: Diagnose APK output
        if: always()
        run: |
          echo "=== apk directory tree ==="
          find app/build -name "*.apk" -type f 2>/dev/null || echo "No APK files under app/build"
          echo "=== workspace-wide APK search ==="
          find . -name "*.apk" -type f 2>/dev/null || echo "No APK files found anywhere"
          echo "=== build/outputs full listing ==="
          ls -la app/build/outputs/ 2>/dev/null || echo "No app/build/outputs/"
          echo "=== build/outputs/apk listing ==="
          ls -laR app/build/outputs/apk/ 2>/dev/null || echo "No app/build/outputs/apk/"
          echo "=== entire build dir (files only) ==="
          find app/build -type f 2>/dev/null | head -100 || echo "No files under app/build"

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build-log.txt

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
          if-no-files-found: error
