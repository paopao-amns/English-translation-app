name: Build Release APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Android SDK
        run: |
          ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          # Install required SDK components if missing
          if [ -d "$ANDROID_SDK_ROOT" ]; then
            yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --install "platforms;android-34" "build-tools;34.0.0" --channel=0 > /dev/null 2>&1 || true
            echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          fi

      - name: Download Gradle wrapper JAR
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            echo "Downloading Gradle 8.5..."
            curl -sSLO "https://services.gradle.org/distributions/gradle-8.5-bin.zip"
            unzip -q gradle-8.5-bin.zip "gradle-8.5/lib/gradle-wrapper-*"
            mv gradle-8.5/lib/gradle-wrapper-*.jar gradle/wrapper/gradle-wrapper.jar
            rm -rf gradle-8.5 gradle-8.5-bin.zip
            echo "Gradle wrapper JAR ready."
          fi

      - name: Generate release keystore
        run: |
          keytool -genkeypair \
            -alias release \
            -keyalg RSA \
            -keysize 2048 \
            -validity 36500 \
            -keystore release.keystore \
            -storepass android \
            -keypass android \
            -dname "CN=EngLearn, OU=Dev, O=EngLearn, L=City, S=State, C=CN" \
            -noprompt

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.5"

      - name: Build release APK
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_PASSWORD: android
          KEY_ALIAS: release
          KEY_PASSWORD: android

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/app-release.apk
