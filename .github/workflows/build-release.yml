name: Build Release APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: "34.0.0"

      - name: Accept SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true

      - name: Write local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Generate launcher icons
        run: |
          python3 -c "
          import struct, zlib, os
          def create_png(width, height, r, g, b):
              def chunk(ctype, data):
                  c = ctype + data
                  return struct.pack('>I', len(data)) + c + struct.pack('>I', zlib.crc32(c) & 0xffffffff)
              header = b'\x89PNG\r\n\x1a\n'
              ihdr = chunk(b'IHDR', struct.pack('>IIBBBBB', width, height, 8, 2, 0, 0, 0))
              raw = b''
              for y in range(height):
                  raw += b'\x00'
                  for x in range(width):
                      raw += bytes([r, g, b])
              idat = chunk(b'IDAT', zlib.compress(raw))
              iend = chunk(b'IEND', b'')
              return header + ihdr + idat + iend
          for d in ['mdpi', 'hdpi', 'xhdpi', 'xxhdpi']:
              os.makedirs(f'app/src/main/res/mipmap-{d}', exist_ok=True)
              with open(f'app/src/main/res/mipmap-{d}/ic_launcher.png', 'wb') as f:
                  f.write(create_png(48, 48, 26, 115, 232))
          "

      - name: Download Gradle wrapper JAR
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            echo "Downloading Gradle 8.5..."
            curl -sSLO "https://services.gradle.org/distributions/gradle-8.5-bin.zip"
            unzip -q gradle-8.5-bin.zip "gradle-8.5/lib/gradle-wrapper-*"
            mv gradle-8.5/lib/gradle-wrapper-*.jar gradle/wrapper/gradle-wrapper.jar
            rm -rf gradle-8.5 gradle-8.5-bin.zip
            echo "Gradle wrapper JAR ready."
          fi

      - name: Generate release keystore
        run: |
          keytool -genkeypair \
            -alias release \
            -keyalg RSA \
            -keysize 2048 \
            -validity 36500 \
            -keystore release.keystore \
            -storepass android \
            -keypass android \
            -dname "CN=EngLearn, OU=Dev, O=EngLearn, L=City, S=State, C=CN" \
            -noprompt

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches/modules-*
            ~/.gradle/wrapper
          key: gradle-dep-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-dep-${{ runner.os }}-

      - name: Build release APK
        run: |
          ./gradlew assembleRelease -x lint -x test --no-build-cache --rerun-tasks > build-log.txt 2>&1
          echo "EXIT_CODE=$?" >> build-log.txt
        env:
          KEYSTORE_PASSWORD: android
          KEY_ALIAS: release
          KEY_PASSWORD: android

      - name: List APK files
        if: always()
        run: |
          echo "=== Full workspace APK search ===" | tee -a build-log.txt
          find . -name "*.apk" -type f 2>/dev/null | tee -a build-log.txt
          echo "=== build/outputs directory tree ===" | tee -a build-log.txt
          find app/build/outputs -type f 2>/dev/null | head -50 | tee -a build-log.txt
          echo "=== sdk.dir ===" | tee -a build-log.txt
          cat local.properties | tee -a build-log.txt

      - name: Upload all build outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-outputs
          path: |
            app/build/outputs/
            build-log.txt
