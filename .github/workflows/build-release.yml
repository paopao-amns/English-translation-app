name: Build Release APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: "34.0.0"

      - name: Accept SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true

      - name: Write local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Download Gradle wrapper JAR
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            echo "Downloading Gradle 8.5..."
            curl -sSLO "https://services.gradle.org/distributions/gradle-8.5-bin.zip"
            unzip -q gradle-8.5-bin.zip "gradle-8.5/lib/gradle-wrapper-*"
            mv gradle-8.5/lib/gradle-wrapper-*.jar gradle/wrapper/gradle-wrapper.jar
            rm -rf gradle-8.5 gradle-8.5-bin.zip
            echo "Gradle wrapper JAR ready."
          fi

      - name: Generate release keystore
        run: |
          keytool -genkeypair \
            -alias release \
            -keyalg RSA \
            -keysize 2048 \
            -validity 36500 \
            -keystore release.keystore \
            -storepass android \
            -keypass android \
            -dname "CN=EngLearn, OU=Dev, O=EngLearn, L=City, S=State, C=CN" \
            -noprompt

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Build release APK
        run: ./gradlew assembleRelease --stacktrace --info
        env:
          KEYSTORE_PASSWORD: android
          KEY_ALIAS: release
          KEY_PASSWORD: android

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/app-release.apk

      - name: Upload build reports (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: |
            app/build/reports/
            ~/.gradle/daemon/*/daemon-*.log
